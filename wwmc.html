<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache,no-store,must-revalidate">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="author" content="Mohammed Alharish – SCE, Al-Qassim 2 CCGT, WWMC">
<title>QAS2 – Commissioning Management System</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{
  --navy:#0D1F35;--navy2:#112540;--navy3:#1A3355;--navy4:#1E3D66;
  --gold:#C9A84C;--gold2:#E8C97A;--gold3:#F5E4B0;
  --green:#10B981;--green2:#065F46;--green3:#D1FAE5;
  --red:#EF4444;--red2:#7F1D1D;--red3:#FEE2E2;
  --amber:#F59E0B;--amber2:#78350F;--amber3:#FEF3C7;
  --blue:#2563EB;--blue2:#1D4ED8;--blue3:#DBEAFE;
  --white:#F8FAFC;--gray1:#CBD5E1;--gray2:#64748B;--gray3:#334155;
  --font:'Segoe UI',system-ui,sans-serif;
  --mono:'Courier New',monospace;
  --r:8px;--r2:12px;
  --shadow:0 4px 20px rgba(0,0,0,.3);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:#0A1628;color:var(--white);font-family:var(--font);min-height:100vh;overflow-x:hidden}

/* GRID BG */
body::before{content:'';position:fixed;inset:0;
  background-image:linear-gradient(rgba(37,99,235,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(37,99,235,.04) 1px,transparent 1px);
  background-size:32px 32px;pointer-events:none;z-index:0}

/* LOGIN */
.login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;
  background:linear-gradient(135deg,#0A1628,#0D1F35,#112540)}
.login-box{background:rgba(255,255,255,.04);border:1px solid rgba(201,168,76,.2);
  border-radius:16px;padding:40px;width:380px;text-align:center;
  box-shadow:0 8px 40px rgba(0,0,0,.5),0 0 0 1px rgba(201,168,76,.1);
  backdrop-filter:blur(10px)}
.login-logo{height:64px;margin-bottom:14px;object-fit:contain}
.login-company{font-size:15px;font-weight:700;color:var(--white);margin-bottom:2px}
.login-sub{font-size:11px;color:var(--gray1);margin-bottom:28px;opacity:.7}
.login-box input{width:100%;padding:12px 16px;font-size:14px;background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.12);color:var(--white);border-radius:var(--r);
  font-family:var(--font);outline:none;transition:all .2s;margin-bottom:10px}
.login-box input:focus{border-color:var(--gold);background:rgba(201,168,76,.08)}
.login-btn{width:100%;padding:12px;font-size:14px;font-weight:700;
  background:linear-gradient(135deg,var(--gold),var(--gold2));color:var(--navy);
  border:none;border-radius:var(--r);cursor:pointer;font-family:var(--font);
  transition:all .2s;margin-top:4px}
.login-btn:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(201,168,76,.4)}
.login-error{color:var(--red);font-size:12px;margin-top:8px;min-height:18px}
.login-hint{font-size:10px;color:var(--gray2);margin-top:16px}

/* TOPBAR */
.topbar{background:linear-gradient(90deg,var(--navy2),var(--navy3));
  border-bottom:1px solid rgba(201,168,76,.25);padding:0 20px;height:56px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:200;box-shadow:0 2px 20px rgba(0,0,0,.5)}
.tb-left{display:flex;align-items:center;gap:12px}
.tb-logo{height:30px;background:#fff;padding:2px 8px;border-radius:5px;object-fit:contain}
.tb-div{width:1px;height:26px;background:rgba(201,168,76,.3)}
.tb-title{font-size:14px;font-weight:700;color:var(--gold2);letter-spacing:.3px}
.tb-sub{font-size:10px;color:var(--gray1);opacity:.6;margin-top:1px}
.tb-right{display:flex;align-items:center;gap:8px}
.tb-badge{font-size:9px;font-weight:700;padding:3px 8px;border-radius:12px;
  background:var(--gold);color:var(--navy);letter-spacing:.5px}
.tb-user{font-size:11px;color:var(--gray1)}
.tb-btn{padding:5px 12px;font-size:11px;font-weight:600;border-radius:6px;
  border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.06);
  color:var(--gray1);cursor:pointer;font-family:var(--font);transition:all .15s}
.tb-btn:hover{background:rgba(255,255,255,.1);color:var(--white)}

/* TABS */
.tabs{display:flex;gap:1px;background:rgba(0,0,0,.3);border-bottom:1px solid rgba(255,255,255,.06);
  padding:0 20px;position:sticky;top:56px;z-index:190;overflow-x:auto}
.tab{padding:11px 16px;font-size:12px;font-weight:600;cursor:pointer;
  border:none;background:transparent;color:var(--gray2);
  border-bottom:2px solid transparent;white-space:nowrap;
  font-family:var(--font);transition:all .15s;display:flex;align-items:center;gap:5px}
.tab.active{color:var(--gold2);border-bottom-color:var(--gold)}
.tab:hover{color:var(--white)}
.tab .cnt{background:var(--red);color:#fff;font-size:9px;font-weight:700;
  padding:1px 5px;border-radius:8px}

/* VIEWS */
.view{display:none;padding:18px 20px;max-width:1200px;margin:0 auto;position:relative;z-index:1}
.view.active{display:block}

/* CARDS */
.card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);
  border-radius:var(--r2);margin-bottom:14px;overflow:hidden}
.card-head{padding:11px 16px;display:flex;align-items:center;gap:9px;
  background:rgba(255,255,255,.03);border-bottom:1px solid rgba(255,255,255,.05)}
.card-icon{font-size:14px;width:26px;height:26px;background:rgba(201,168,76,.12);
  border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.card-title{font-size:13px;font-weight:700;color:var(--gold2);letter-spacing:.3px;flex:1}
.card-body{padding:14px 16px}

/* METRICS */
.metrics{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:16px}
.metric{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);
  border-radius:var(--r2);padding:12px;text-align:center;position:relative;overflow:hidden}
.metric::after{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.metric.blue::after{background:var(--blue)}
.metric.green::after{background:var(--green)}
.metric.red::after{background:var(--red)}
.metric.amber::after{background:var(--amber)}
.metric.gold::after{background:var(--gold)}
.metric-val{font-size:28px;font-weight:700;line-height:1;font-variant-numeric:tabular-nums}
.metric.blue .metric-val{color:#93C5FD}
.metric.green .metric-val{color:var(--green)}
.metric.red .metric-val{color:var(--red)}
.metric.amber .metric-val{color:var(--amber)}
.metric.gold .metric-val{color:var(--gold2)}
.metric-lbl{font-size:10px;color:var(--gray2);margin-top:4px;text-transform:uppercase;letter-spacing:.5px}

/* FIELDS */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.grid4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px}
.field{display:flex;flex-direction:column;gap:4px}
.field label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--gold);opacity:.8}
.field input,.field select,.field textarea{
  background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);
  color:var(--white);font-family:var(--font);font-size:13px;
  padding:9px 12px;border-radius:var(--r);outline:none;transition:all .2s}
.field input:focus,.field select:focus,.field textarea:focus{
  border-color:var(--gold);background:rgba(201,168,76,.07);box-shadow:0 0 0 3px rgba(201,168,76,.1)}
.field input[readonly]{color:var(--gold2);font-family:var(--mono);font-size:11px}
.field select option{background:#1a2a40}
.field textarea{resize:vertical;min-height:80px;line-height:1.6}

/* BUTTONS */
.btn{padding:8px 18px;font-size:12px;font-weight:600;border-radius:var(--r);
  border:1px solid transparent;cursor:pointer;font-family:var(--font);
  transition:all .15s;display:inline-flex;align-items:center;gap:5px}
.btn.primary{background:linear-gradient(135deg,var(--gold),var(--gold2));color:var(--navy)}
.btn.primary:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(201,168,76,.3)}
.btn.ghost{background:rgba(255,255,255,.06);color:var(--gray1);border-color:rgba(255,255,255,.1)}
.btn.ghost:hover{background:rgba(255,255,255,.1);color:var(--white)}
.btn.danger{background:rgba(239,68,68,.1);color:var(--red);border-color:rgba(239,68,68,.25)}
.btn.danger:hover{background:rgba(239,68,68,.2)}
.btn.success{background:rgba(16,185,129,.1);color:var(--green);border-color:rgba(16,185,129,.25)}
.btn:disabled{opacity:.35;cursor:not-allowed;transform:none!important}
.btn.sm{padding:5px 12px;font-size:11px}

/* BADGE */
.badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px}
.badge.open{background:rgba(239,68,68,.15);color:var(--red);border:1px solid rgba(239,68,68,.2)}
.badge.closed{background:rgba(16,185,129,.15);color:var(--green);border:1px solid rgba(16,185,129,.2)}
.badge.a{background:rgba(239,68,68,.2);color:var(--red)}
.badge.b{background:rgba(245,158,11,.2);color:var(--amber)}
.badge.c{background:rgba(100,116,139,.2);color:var(--gray1)}
.badge.submitted{background:rgba(16,185,129,.15);color:var(--green)}

/* TABLE */
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl th{padding:9px 12px;text-align:left;font-size:10px;font-weight:700;
  text-transform:uppercase;letter-spacing:.5px;color:var(--gray2);
  background:rgba(255,255,255,.03);border-bottom:1px solid rgba(255,255,255,.06)}
.tbl td{padding:9px 12px;border-bottom:1px solid rgba(255,255,255,.04);vertical-align:middle}
.tbl tr:hover td{background:rgba(255,255,255,.02)}
.tbl .no{font-family:var(--mono);font-size:11px;font-weight:700;color:var(--gold2)}
.tbl .actions{display:flex;gap:5px}

/* PHOTO */
.photo-area{border:2px dashed rgba(255,255,255,.15);border-radius:var(--r);
  padding:20px;text-align:center;cursor:pointer;transition:all .2s}
.photo-area:hover{border-color:var(--gold);background:rgba(201,168,76,.05)}
.photo-area .ico{font-size:24px;margin-bottom:6px}
.photo-area p{font-size:12px;color:var(--gray2)}
.photo-area small{font-size:10px;color:var(--gray2);opacity:.6}
.photo-grid{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
.photo-thumb{position:relative;width:80px;height:60px}
.photo-thumb img{width:100%;height:100%;object-fit:cover;border-radius:5px;border:1px solid rgba(255,255,255,.1);cursor:pointer}
.photo-thumb .del{position:absolute;top:-5px;right:-5px;background:var(--red);color:#fff;
  border:none;border-radius:50%;width:16px;height:16px;font-size:10px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;line-height:1}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:500;
  display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-bg.show{opacity:1;pointer-events:all}
.modal{background:var(--navy2);border:1px solid rgba(255,255,255,.1);border-radius:var(--r2);
  width:90%;max-width:700px;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow)}
.modal-head{padding:14px 18px;display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid rgba(255,255,255,.07)}
.modal-head h3{font-size:14px;font-weight:700;color:var(--gold2)}
.modal-head button{background:none;border:none;color:var(--gray2);cursor:pointer;font-size:18px;padding:0 4px}
.modal-body{padding:18px}

/* PRIORITY PILLS */
.pill-row{display:flex;flex-wrap:wrap;gap:6px}
.pill{padding:5px 12px;border-radius:16px;font-size:11px;font-weight:600;
  cursor:pointer;border:1px solid transparent;transition:all .15s;user-select:none}
.pill.g{background:rgba(16,185,129,.1);border-color:rgba(16,185,129,.2);color:var(--green)}
.pill.g.on{background:var(--green2);border-color:var(--green);color:#fff}
.pill.a{background:rgba(245,158,11,.1);border-color:rgba(245,158,11,.2);color:var(--amber)}
.pill.a.on{background:var(--amber2);border-color:var(--amber);color:#fff}
.pill.r{background:rgba(239,68,68,.1);border-color:rgba(239,68,68,.2);color:var(--red)}
.pill.r.on{background:var(--red2);border-color:var(--red);color:#fff}
.pill.b{background:rgba(37,99,235,.1);border-color:rgba(37,99,235,.2);color:#93C5FD}
.pill.b.on{background:rgba(37,99,235,.4);border-color:var(--blue);color:#fff}

/* LIGHTBOX */
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:9000;
  display:none;align-items:center;justify-content:center}
.lightbox.show{display:flex}
.lightbox img{max-width:90vw;max-height:90vh;border-radius:var(--r);object-fit:contain}
.lightbox-close{position:absolute;top:20px;right:24px;background:none;border:none;
  color:#fff;font-size:28px;cursor:pointer}

/* PRINT ZONE */
.print-zone{display:none;position:fixed;top:0;left:0;width:100%;height:100%;
  background:#fff;z-index:9999;overflow-y:auto}
.print-zone.show{display:block}
.print-zone-inner{max-width:900px;margin:0 auto;padding:30px;font-family:Arial,sans-serif}
.print-actions{text-align:center;padding:14px;background:#f5f5f5;
  border-top:1px solid #ddd;position:sticky;bottom:0}

/* TOAST */
.toast{position:fixed;bottom:22px;right:22px;background:var(--gold);color:var(--navy);
  font-weight:700;font-size:12px;padding:10px 18px;border-radius:var(--r);
  opacity:0;transition:opacity .3s;pointer-events:none;z-index:9999;
  box-shadow:0 4px 20px rgba(201,168,76,.4)}
.toast.show{opacity:1}

/* DAILY REPORT */
.dr-section{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);
  border-radius:var(--r2);margin-bottom:12px;overflow:hidden}
.dr-section-head{background:rgba(255,255,255,.04);padding:10px 14px;
  font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;
  color:var(--gold2);border-bottom:1px solid rgba(255,255,255,.06);
  display:flex;align-items:center;gap:8px}
.dr-section-body{padding:14px}
.dr-report-card{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);
  border-left:3px solid var(--blue);border-radius:var(--r);padding:12px 14px;margin-bottom:8px}
.dr-report-card .dr-name{font-weight:700;font-size:13px;color:var(--white)}
.dr-report-card .dr-meta{font-size:10px;color:var(--gray2);margin-top:2px}
.dr-report-card .dr-body{margin-top:8px;font-size:12px;color:var(--gray1);line-height:1.7}
.dr-report-label{font-size:10px;font-weight:700;text-transform:uppercase;color:var(--gold);letter-spacing:.5px}
.check-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:7px}
.ci{display:flex;align-items:center;gap:7px;padding:7px 10px;
  background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.06);
  border-radius:6px;cursor:pointer;transition:all .15s;user-select:none}
.ci:hover{background:rgba(201,168,76,.06);border-color:rgba(201,168,76,.2)}
.ci.on{background:rgba(16,185,129,.07);border-color:rgba(16,185,129,.25)}
.ci input{display:none}
.ci-box{width:15px;height:15px;border:1.5px solid rgba(201,168,76,.35);border-radius:3px;
  flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px;color:#fff;transition:all .15s}
.ci.on .ci-box{background:var(--green);border-color:var(--green)}
.ci-lbl{font-size:11px;color:var(--gray1);line-height:1.3}
.ci.on .ci-lbl{color:var(--white)}

/* PUNCH LIST TICKET CARD */
.ticket-card{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);
  border-left:3px solid transparent;border-radius:var(--r);padding:10px 12px;
  margin-bottom:6px;transition:all .2s;cursor:pointer}
.ticket-card:hover{background:rgba(255,255,255,.05);border-color:rgba(255,255,255,.12)}
.ticket-card.pA{border-left-color:var(--red)}
.ticket-card.pB{border-left-color:var(--amber)}
.ticket-card.pC{border-left-color:var(--gray2)}
.ticket-card.closed{opacity:.6}
.tc-head{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.tc-no{font-family:var(--mono);font-size:10px;font-weight:700;color:var(--gold2);
  background:rgba(201,168,76,.1);padding:2px 7px;border-radius:4px}
.tc-sys{font-size:12px;font-weight:600;color:var(--white);flex:1}
.tc-body{font-size:11px;color:var(--gray2);margin-top:5px;line-height:1.5}
.tc-foot{display:flex;gap:10px;margin-top:6px;font-size:10px;color:var(--gray2)}

/* HANDOVER REPORT */
.ho-section{margin-bottom:16px}

/* PRINT CSS */
@media print{
  .no-print{display:none!important}
  body>*{display:none!important}
  .print-zone{display:block!important;position:static!important;overflow:visible!important}
  .print-zone-inner{padding:20px}
  .print-actions{display:none!important}
}

@media(max-width:768px){
  .metrics{grid-template-columns:1fr 1fr 1fr}
  .grid2,.grid3,.grid4{grid-template-columns:1fr}
  .view{padding:12px 14px}
  .tabs{overflow-x:auto}
}
</style>
</head>
<body>
<script>

const SB_URL='https://fbuvnbehzqheqhfqzocy.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZidXZuYmVoenFoZXFoZnF6b2N5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU5MTYzMTEsImV4cCI6MjA5MTQ5MjMxMX0.G_9i6zlxPOpdaYQFB8uva4CnTmH7CUQmA87P0_V4mEw';
let currentUser=null;
let pendingPhotos={};
let charts={};

// ── SUPABASE ──
async function sb(path,method,body){
  method=method||'GET';
  var headers={'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json'};
  if(method==='POST'||method==='PATCH')headers['Prefer']='return=representation';
  var opts={method:method,headers:headers};
  if(body)opts.body=JSON.stringify(body);
  var r=await fetch(SB_URL+'/rest/v1/'+path,opts);
  if(!r.ok){var e=await r.text();throw new Error(e);}
  return r.status===204?null:await r.json();
}

// ── AUTH ──
async function doLogin(){
  var u=document.getElementById('login-user').value.trim();
  var p=document.getElementById('login-pass').value.trim();
  var err=document.getElementById('login-err');
  if(!u||!p){err.textContent='Please enter username and password';return;}
  try{
    var users=await sb('qas2_users?username=eq.'+encodeURIComponent(u)+'&password=eq.'+encodeURIComponent(p)+'&select=*');
    if(!users||!users.length){err.textContent='Invalid username or password';return;}
    currentUser=users[0];
    sessionStorage.setItem('qas2_user',JSON.stringify(currentUser));
    initApp();
  }catch(e){err.textContent='Connection error. Please try again.';}
}

function doLogout(){
  sessionStorage.removeItem('qas2_user');
  currentUser=null;
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('main-app').style.display='none';
}

function initApp(){
  document.getElementById('login-screen').style.display='none';
  document.getElementById('main-app').style.display='block';
  var roleLabel=currentUser.role==='admin'?'SCE – Shift Charge Engineer':currentUser.role==='supervisor'?'Supervisor':'Field Operator';
  document.getElementById('tb-username').textContent=currentUser.name;
  document.getElementById('tb-user-info').textContent=currentUser.name+' – '+roleLabel;
  var badge=document.getElementById('tb-role-badge');
  badge.textContent=currentUser.role==='admin'?'SCE':currentUser.role==='supervisor'?'SUPERVISOR':'OPERATOR';
  badge.style.background=currentUser.role==='admin'?'var(--gold)':currentUser.role==='supervisor'?'var(--blue)':'var(--gray2)';
  badge.style.color=currentUser.role==='admin'?'var(--navy)':'#fff';
  if(currentUser.role==='admin'){
    document.querySelectorAll('.admin-only').forEach(function(el){el.style.display='';});
  }
  initNewForm();
  renderDashboard();
  setInterval(function(){if(document.getElementById('view-dashboard').classList.contains('active'))renderDashboard();},60000);
}

window.onload=function(){
  var saved=sessionStorage.getItem('qas2_user');
  if(saved){currentUser=JSON.parse(saved);initApp();}
};

// ── TAB SWITCHING ──
function switchTab(tab){
  var views=['dashboard','new','register','users','approvals','dailyreport','handover'];
  views.forEach(function(v){
    var el=document.getElementById('view-'+v);
    if(el)el.classList.toggle('active',v===tab);
  });
  document.querySelectorAll('.tab').forEach(function(t){
    t.classList.toggle('active',(t.getAttribute('onclick')||'').indexOf("'"+tab+"'")!==-1);
  });

function showToast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},3000);}
function isOverdue(t){return t.status==='OPEN'&&t.deadline&&new Date(t.deadline)<new Date();}
function openLightbox(src){document.getElementById('lightbox-img').src=src;document.getElementById('lightbox').classList.add('show');}
function closePrintZone(){document.getElementById('print-zone').classList.remove('show');}

async function compressImage(file){
  return new Promise(function(res){
    var r=new FileReader();
    r.onload=function(e){
      var img=new Image();
      img.onload=function(){
        var c=document.createElement('canvas');
        var max=800,w=img.width,h=img.height;
        if(w>max){h=h*max/w;w=max;}
        if(h>max){w=w*max/h;h=max;}
        c.width=w;c.height=h;
        c.getContext('2d').drawImage(img,0,0,w,h);
        res(c.toDataURL('image/jpeg',.7));
      };
      img.src=e.target.result;
    };
    r.readAsDataURL(file);
  });
}

async function handlePhotos(e,gridId,inputId){
  if(!pendingPhotos[gridId])pendingPhotos[gridId]=[];
  for(var i=0;i<e.target.files.length;i++){
    var c=await compressImage(e.target.files[i]);
    pendingPhotos[gridId].push(c);
  }
  renderPhotos(gridId);
  document.getElementById(inputId).value='';
}

function renderPhotos(gridId){
  var grid=document.getElementById(gridId);
  var photos=pendingPhotos[gridId]||[];
  grid.innerHTML=photos.map(function(p,i){
    return '<div class="photo-thumb"><img src="'+p+'" onclick="openLightbox(this.src)"><button class="del" onclick="removePhoto(''+gridId+'','+i+')">&#x2715;</button></div>';
  }).join('');
}

function removePhoto(gridId,i){pendingPhotos[gridId].splice(i,1);renderPhotos(gridId);}

async function renderDashboard(){
  var tickets=await sb('qas2_tickets?select=no,status,priority,system_name,date,deadline')||[];
  var total=tickets.length;
  var open=tickets.filter(function(t){return t.status==='OPEN';}).length;
  var closed=tickets.filter(function(t){return t.status==='CLOSED';}).length;
  var overdue=tickets.filter(isOverdue).length;
  var pct=total?Math.round(closed/total*100):0;
  document.getElementById('m-total').textContent=total;
  document.getElementById('m-open').textContent=open;
  document.getElementById('m-closed').textContent=closed;
  document.getElementById('m-overdue').textContent=overdue;
  document.getElementById('m-pct').textContent=pct+'%';
  document.getElementById('open-cnt').textContent=open;
  document.getElementById('open-cnt').style.display=open>0?'inline':'none';

  // Charts
  var buildChart=function(id,type,labels,data,colors){
    if(charts[id])charts[id].destroy();
    var ctx=document.getElementById(id);
    if(!ctx)return;
    charts[id]=new Chart(ctx,{type:type,data:{labels:labels,datasets:[{data:data,backgroundColor:colors,borderWidth:0}]},
      options:{responsive:true,plugins:{legend:{position:'bottom',labels:{color:'#94A3B8',font:{size:10}}}}}});
  };
  buildChart('ch-status','doughnut',['Open','Closed'],[open,closed],['#EF4444','#10B981']);
  var priA=tickets.filter(function(t){return t.priority==='A';}).length;
  var priB=tickets.filter(function(t){return t.priority==='B';}).length;
  var priC=tickets.filter(function(t){return t.priority==='C';}).length;
  buildChart('ch-priority','bar',['A','B','C'],[priA,priB,priC],['#EF4444','#F59E0B','#64748B']);
  var sysMap={};
  tickets.forEach(function(t){if(t.system_name)sysMap[t.system_name]=(sysMap[t.system_name]||0)+1;});
  var sysKeys=Object.keys(sysMap).sort(function(a,b){return sysMap[b]-sysMap[a];}).slice(0,6);
  buildChart('ch-system','bar',sysKeys,sysKeys.map(function(k){return sysMap[k];}),['#2563EB','#3B82F6','#60A5FA','#93C5FD','#BFDBFE','#DBEAFE']);

  // Priority A tickets
  var priATickets=await sb('qas2_tickets?priority=eq.A&status=eq.OPEN&select=no,system_name,description,date&order=date.asc')||[];
  var el=document.getElementById('dash-priA');
  if(!priATickets.length){el.innerHTML='<div style="color:var(--green);font-size:12px;text-align:center;padding:10px">&#10003; No Priority A open tickets</div>';return;}
  el.innerHTML=priATickets.map(function(t){
    return '<div class="ticket-card pA" onclick="openTicket(''+t.no+'')">'+
      '<div class="tc-head"><span class="tc-no">'+t.no+'</span><span class="tc-sys">'+t.system_name+'</span>'+
      '<span class="badge a">PRI-A</span></div>'+
      '<div class="tc-body">'+(t.description||'').substring(0,80)+(t.description&&t.description.length>80?'…':'')+'</div>'+
      '</div>';
  }).join('');
}

async function initNewForm(){
  var d=new Date();
  document.getElementById('n-date').value=d.toISOString().split('T')[0];
  document.getElementById('n-raised-by').value=currentUser?currentUser.name:'';
  pendingPhotos['n-photos']=[];
  // Get next ticket number
  try{
    var ctr=await sb("qas2_counters?month_key=eq.PL_"+d.getFullYear()+String(d.getMonth()+1).padStart(2,'0')+"&select=counter");
    var next=(ctr&&ctr.length?ctr[0].counter:0)+1;
    document.getElementById('n-no').value='QAS2-PL-'+d.getFullYear()+String(d.getMonth()+1).padStart(2,'0')+'-'+String(next).padStart(3,'0');
  }catch(e){
    document.getElementById('n-no').value='QAS2-PL-'+d.getFullYear()+String(d.getMonth()+1).padStart(2,'0')+'-001';
  }
}

async function submitTicket(){
  var no=document.getElementById('n-no').value;
  var system=document.getElementById('n-system').value.trim();
  var desc=document.getElementById('n-desc').value.trim();
  if(!system||!desc){showToast('Please fill in System and Description');return;}
  var btn=event.target;btn.disabled=true;btn.textContent='Submitting...';
  try{
    // Increment counter
    var d=new Date();
    var mk='PL_'+d.getFullYear()+String(d.getMonth()+1).padStart(2,'0');
    var ctr=await sb('qas2_counters?month_key=eq.'+mk+'&select=counter');
    var next=(ctr&&ctr.length?ctr[0].counter:0)+1;
    if(ctr&&ctr.length){await sb('qas2_counters?month_key=eq.'+mk,'PATCH',{counter:next});}
    else{await sb('qas2_counters','POST',{month_key:mk,counter:1});}

    var ticket={
      no:no,date:document.getElementById('n-date').value,
      system_name:system.toUpperCase(),
      category:document.getElementById('n-category').value,
      priority:document.getElementById('n-priority').value,
      pid:document.getElementById('n-pid').value.trim(),
      kks:document.getElementById('n-kks').value.trim(),
      description:desc,
      action:document.getElementById('n-action').value.trim(),
      raised_by:currentUser.name,
      deadline:document.getElementById('n-deadline').value||null,
      status:'OPEN'
    };
    var saved=await sb('qas2_tickets','POST',ticket);
    // Save photos
    var photos=pendingPhotos['n-photos']||[];
    if(photos.length&&saved&&saved[0]){
      for(var i=0;i<photos.length;i++){
        await sb('qas2_photos','POST',{ticket_id:saved[0].id,photo_data:photos[i]});
      }
    }
    showToast('Ticket '+no+' submitted \u2713');
    clearNewForm();
    await initNewForm();
  }catch(e){showToast('Error: '+e.message);}
  btn.disabled=false;btn.textContent='Submit Ticket';
}

function clearNewForm(){
  ['n-system','n-pid','n-kks','n-desc','n-action','n-deadline'].forEach(function(id){document.getElementById(id).value='';});
  document.getElementById('n-priority').value='B';
  document.getElementById('n-category').selectedIndex=0;
  pendingPhotos['n-photos']=[];
  renderPhotos('n-photos');
}

// ── EXPORT CSV ──
async function exportCSV(){
  var tickets=await sb('qas2_tickets?select=*&order=date.desc')||[];
  var h=['No','System','Category','Priority','Status','Description','Action','Raised By','Date Raised','Target Close','Date Closed','P&ID','KKS'];
  var r=tickets.map(function(t){return[t.no,t.system_name,t.category,t.priority,t.status,
    (t.description||'').replace(/,/g,';'),
    (t.action||'').replace(/,/g,';'),
    t.raised_by,t.date,t.deadline||'',t.date_closed||'',t.pid||'',t.kks||''].join(',');});
  var a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,\uFEFF'+encodeURIComponent([h.join(','),...r].join('\n'));
  a.download='QAS2-PunchList-'+new Date().toISOString().split('T')[0]+'.csv';
  a.click();
}

// ── USERS ──
async function loadUsers(){
  var users=await sb('qas2_users?select=id,username,name,role,created_at&order=created_at.asc')||[];
  var body=document.getElementById('users-body');
  body.innerHTML=users.map(function(u){
    return '<tr>'+
      '<td style="font-family:var(--mono);font-size:11px">'+u.username+'</td>'+
      '<td style="font-size:12px;font-weight:600">'+u.name+'</td>'+
      '<td><span class="badge '+(u.role==='admin'?'a':u.role==='supervisor'?'b':'c')+'">'+u.role+'</span></td>'+
      '<td style="font-size:11px;color:var(--gray2)">'+(u.created_at?u.created_at.split('T')[0]:'–')+'</td>'+
      '<td class="actions">'+
      (u.username!=='admin'?'<button class="btn ghost btn-sm" onclick="openEditUser(''+u.id+'')">Edit</button>'+
      '<button class="btn danger btn-sm" onclick="deleteUser(''+u.id+'',''+u.username+'')">Delete</button>':'')+
      '</td></tr>';
  }).join('');
}

function openAddUser(){
  document.getElementById('um-id').value='';
  document.getElementById('user-modal-title').textContent='Add User';
  ['um-username','um-name','um-pass'].forEach(function(id){document.getElementById(id).value='';});
  document.getElementById('um-role').value='user';
  document.getElementById('um-username').readOnly=false;
  document.getElementById('user-modal-bg').classList.add('show');
}

async function openEditUser(id){
  var users=await sb('qas2_users?id=eq.'+id+'&select=*');
  if(!users||!users.length)return;
  var u=users[0];
  document.getElementById('um-id').value=u.id;
  document.getElementById('user-modal-title').textContent='Edit User';
  document.getElementById('um-username').value=u.username;
  document.getElementById('um-username').readOnly=true;
  document.getElementById('um-name').value=u.name;
  document.getElementById('um-pass').value='';
  document.getElementById('um-role').value=u.role;
  document.getElementById('user-modal-bg').classList.add('show');
}

async function saveUser(){
  var id=document.getElementById('um-id').value;
  var username=document.getElementById('um-username').value.trim();
  var name=document.getElementById('um-name').value.trim();
  var pass=document.getElementById('um-pass').value.trim();
  var role=document.getElementById('um-role').value;
  if(!username||!name){showToast('Username and name required');return;}
  try{
    if(id){
      var data={name:name,role:role};
      if(pass)data.password=pass;
      await sb('qas2_users?id=eq.'+id,'PATCH',data);
    }else{
      if(!pass){showToast('Password required');return;}
      await sb('qas2_users','POST',{username:username,name:name,password:pass,role:role});
    }
    showToast('User saved \u2713');

}

var DR_SYSTEMS=['ACW – Auxiliary Cooling Water','CAS – Compressed Air System',
  'BOG – Blackout Generator','Fuel Oil System','Lube Oil System',
  'Chemical Dosing System','Demin Water System','GT1 – Gas Turbine 1',
  'GT2 – Gas Turbine 2','GT3 – Gas Turbine 3','ST – Steam Turbine',
  'HRSG-1','HRSG-2','HRSG-3','DCS / SPPA-T3000','Electrical / MCC',
  'Civil / Structural','General Site'];

async function initDailyReport(){
  var d=new Date();
  var dateStr=d.toISOString().split('T')[0];
  document.getElementById('dr-date').value=dateStr;
  document.getElementById('dr-date-lbl').textContent=d.toLocaleDateString('en-GB',{day:'2-digit',month:'long',year:'numeric'});

  var isAdmin=currentUser&&currentUser.role==='admin';

  if(isAdmin){
    document.getElementById('dr-form').style.display='block';
    document.getElementById('dr-readonly-notice').style.display='none';
    document.getElementById('dr-compile-btn').style.display='inline-flex';
    // Set name and role (fixed for admin)
    document.getElementById('dr-preparedby').value='Mohammed Alharish';
    document.getElementById('dr-role').value='SCE – Shift Charge Engineer';
    // Get report number
    try{
      var ctr=await sb('qas2_counters?month_key=eq.DAR_GLOBAL&select=counter');
      var next=(ctr&&ctr.length?ctr[0].counter:0)+1;
      document.getElementById('dr-repno').value='QAS2-DAR-'+String(next).padStart(4,'0');
    }catch(e){document.getElementById('dr-repno').value='QAS2-DAR-0001';}
    // Build systems grid
    buildCheckGrid('dr-systems-grid',DR_SYSTEMS);
    // Load punch tickets for selection
    await loadDRTickets();
    pendingPhotos['dr-photos']=[];
    renderPhotos('dr-photos');
  }else{
    // Non-admin: allow writing name but hide form inputs
    document.getElementById('dr-form').style.display='none';
    document.getElementById('dr-readonly-notice').style.display='block';
  }

  // Everyone sees today's reports
  document.getElementById('dr-all-reports').style.display='block';
  loadTodayReports();
}

async function loadDRTickets(){
  var tickets=await sb('qas2_tickets?status=eq.OPEN&select=no,system_name,priority,description&order=priority.asc')||[];
  var el=document.getElementById('dr-tickets-select');
  if(!tickets.length){el.innerHTML='<div style="color:var(--green);font-size:12px">&#10003; No open punch tickets</div>';return;}
  el.innerHTML='<div style="display:flex;flex-direction:column;gap:6px">'+
    tickets.map(function(t){
      return '<label style="display:flex;align-items:center;gap:10px;padding:7px 10px;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.06);border-radius:6px;cursor:pointer">'+
        '<input type="checkbox" value="'+t.no+'" style="accent-color:var(--gold)">'+
        '<span style="font-family:var(--mono);font-size:10px;color:var(--gold2);background:rgba(201,168,76,.1);padding:1px 7px;border-radius:4px">'+t.no+'</span>'+
        '<span style="font-size:11px;font-weight:600;color:var(--white);min-width:80px">'+t.system_name+'</span>'+
        '<span class="badge '+(t.priority==='A'?'a':t.priority==='B'?'b':'c')+'">'+t.priority+'</span>'+
        '<span style="font-size:11px;color:var(--gray2);flex:1">'+(t.description||'').substring(0,50)+'</span>'+
        '</label>';
    }).join('')+'</div>';
}

function buildCheckGrid(id,items){
  document.getElementById(id).innerHTML=items.map(function(item){
    return '<label class="ci" onclick="toggleCI(this)">'+
      '<input type="checkbox" value="'+item+'">'+
      '<div class="ci-box">&#10003;</div>'+
      '<span class="ci-lbl">'+item+'</span></label>';
  }).join('');
}

function toggleCI(el){
  el.classList.toggle('on');
  el.querySelector('input').checked=el.classList.contains('on');
}

function getCheckedCI(id){
  return Array.from(document.querySelectorAll('#'+id+' input:checked')).map(function(c){return c.value;});
}

function getSelectedTickets(){
  return Array.from(document.querySelectorAll('#dr-tickets-select input:checked')).map(function(c){return c.value;});
}

async function submitDailyReport(){
  var activities=document.getElementById('dr-activities').value.trim();
  var systems=getCheckedCI('dr-systems-grid');
  var systemsOther=document.getElementById('dr-systems-other').value.trim();
  var allSystems=[...systems,...(systemsOther?[systemsOther]:[])].join(', ');

  if(!allSystems&&!activities){showToast('Please fill in at least one field');return;}

  var btn=event.target;btn.disabled=true;btn.textContent='Submitting...';

  try{
    var now=new Date();
    var repNo=document.getElementById('dr-repno').value;
    // Increment counter
    var ctr=await sb('qas2_counters?month_key=eq.DAR_GLOBAL&select=counter');
    var next=(ctr&&ctr.length?ctr[0].counter:0)+1;
    if(ctr&&ctr.length){await sb('qas2_counters?month_key=eq.DAR_GLOBAL','PATCH',{counter:next});}
    else{await sb('qas2_counters','POST',{month_key:'DAR_GLOBAL',counter:1});}

    var selectedTickets=getSelectedTickets();
    var photos=pendingPhotos['dr-photos']||[];

    await sb('qas2_daily_reports','POST',{
      report_no:repNo,
      report_date:document.getElementById('dr-date').value,
      submitted_by:'Mohammed Alharish',
      submitted_by_username:'admin',
      role:'SCE – Shift Charge Engineer',
      system_worked:allSystems||'General',
      activities:activities||'General commissioning activities',
      achievements:document.getElementById('dr-achievements').value.trim()||'None reported',
      issues:document.getElementById('dr-issues').value.trim()||'No issues',
      next_plan:document.getElementById('dr-plans').value.trim()||'Continue commissioning activities',
      selected_tickets:selectedTickets.join(', ')||null,
      new_tickets:document.getElementById('dr-new-tickets').value.trim()||null,
      photos:photos.length?photos:[],
      status:'submitted'
    });

    showToast(repNo+' submitted \u2713');
    clearDRForm();
    loadTodayReports();
  }catch(e){showToast('Error: '+e.message);}
  btn.disabled=false;btn.textContent='\u2713 Submit Report';
}

function clearDRForm(){
  ['dr-activities','dr-achievements','dr-issues','dr-plans','dr-new-tickets','dr-systems-other'].forEach(function(id){
    var el=document.getElementById(id);if(el)el.value='';
  });
  document.querySelectorAll('#dr-systems-grid .ci').forEach(function(el){
    el.classList.remove('on');el.querySelector('input').checked=false;
  });
  document.querySelectorAll('#dr-tickets-select input').forEach(function(i){i.checked=false;});
  pendingPhotos['dr-photos']=[];
  renderPhotos('dr-photos');
}

async function loadTodayReports(){
  var today=new Date().toISOString().split('T')[0];
  var reports=await sb('qas2_daily_reports?report_date=eq.'+today+'&select=*&order=created_at.asc')||[];
  document.getElementById('dr-count').textContent=reports.length;
  var isAdmin=currentUser&&currentUser.role==='admin';
  var list=document.getElementById('dr-reports-list');
  if(!reports.length){list.innerHTML='<div style="text-align:center;padding:20px;color:var(--gray2);font-size:12px">No reports submitted yet today</div>';return;}
  list.innerHTML=reports.map(function(r){
    return '<div class="dr-report-card" id="rcard-'+r.id+'">'+
      '<div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px">'+
      '<div>'+
      '<div class="dr-name">'+r.report_no+' &nbsp;\u2014&nbsp; '+r.submitted_by+'</div>'+
      '<div class="dr-meta">'+(r.role||'').replace('SIC Engineer','SCE – Shift Charge Engineer')+
      ' | Submitted: '+new Date(r.created_at).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'})+
      ' | '+r.system_worked+'</div>'+
      '</div>'+
      '<div style="display:flex;gap:6px;align-items:center">'+
      '<button class="btn ghost btn-sm" onclick="printSingleReport(''+r.id+'')">&#128438; PDF</button>'+
      (isAdmin?'<button class="btn ghost btn-sm" onclick="editReport(''+r.id+'')">&#9998; Edit</button>':'')+
      '<span class="badge submitted">SUBMITTED</span>'+
      '</div></div>'+
      '<div class="dr-body" id="rbody-'+r.id+'">'+
      (r.system_worked?'<div><span class="dr-report-label">Systems: </span>'+r.system_worked+'</div>':'')+
      (r.activities&&r.activities!=='General commissioning activities'?'<div style="margin-top:4px"><span class="dr-report-label">Activities: </span>'+r.activities+'</div>':'')+
      (r.achievements&&r.achievements!=='None reported'?'<div style="margin-top:4px;color:var(--green)"><span class="dr-report-label">Achievements: </span>'+r.achievements+'</div>':'')+
      (r.issues&&r.issues!=='No issues'?'<div style="margin-top:4px;color:var(--red)"><span class="dr-report-label">Issues: </span>'+r.issues+'</div>':'')+
      (r.selected_tickets?'<div style="margin-top:4px"><span class="dr-report-label">Tickets Included: </span>'+r.selected_tickets+'</div>':'')+
      '<div style="margin-top:4px"><span class="dr-report-label">Tomorrow: </span>'+r.next_plan+'</div>'+
      (r.photos&&r.photos.length?'<div style="margin-top:6px"><span class="dr-report-label">Photos ('+r.photos.length+'): </span><div class="photo-grid">'+r.photos.map(function(p){return '<div class="photo-thumb"><img src="'+p+'" onclick="openLightbox(this.src)"></div>';}).join('')+'</div></div>':'')+
      '</div></div>';
  }).join('');
}

function editReport(id){
  var card=document.getElementById('rcard-'+id);
  var body=document.getElementById('rbody-'+id);
  var cur={activities:'',achievements:'',issues:'',next_plan:''};
  body.querySelectorAll('.dr-report-label').forEach(function(l){
    var text=l.parentElement.childNodes[1]?l.parentElement.childNodes[1].textContent.trim():'';
    if(l.textContent.includes('Activities'))cur.activities=text;
    if(l.textContent.includes('Achievements'))cur.achievements=text;
    if(l.textContent.includes('Issues'))cur.issues=text;
    if(l.textContent.includes('Tomorrow'))cur.next_plan=text;
  });
  body.innerHTML='<div style="display:flex;flex-direction:column;gap:8px;margin-top:8px">'+
    '<div class="field"><label>Activities</label><textarea id="ea-'+id+'" style="min-height:60px">'+cur.activities+'</textarea></div>'+
    '<div class="field"><label>Achievements</label><textarea id="ech-'+id+'" style="min-height:50px">'+cur.achievements+'</textarea></div>'+
    '<div class="field"><label>Issues</label><textarea id="ei-'+id+'" style="min-height:50px">'+cur.issues+'</textarea></div>'+
    '<div class="field"><label>Plan for Tomorrow</label><textarea id="ep-'+id+'" style="min-height:50px">'+cur.next_plan+'</textarea></div>'+
    '<div style="display:flex;gap:8px;justify-content:flex-end">'+
    '<button class="btn ghost btn-sm" onclick="loadTodayReports()">Cancel</button>'+
    '<button class="btn primary btn-sm" onclick="saveEditReport(''+id+'')">\u2713 Save</button>'+
    '</div></div>';
}

async function saveEditReport(id){

async function compileMasterReport(){
  var today=new Date().toISOString().split('T')[0];
  var reports=await sb('qas2_daily_reports?report_date=eq.'+today+'&select=*&order=created_at.asc')||[];
  if(!reports.length){alert('No reports submitted today.');return;}
  var punches=await sb('qas2_tickets?status=eq.OPEN&select=no,system_name,priority,description&order=priority.asc')||[];

  // Get selected tickets from the reports
  var reportTickets=[];
  reports.forEach(function(r){
    if(r.selected_tickets)reportTickets=reportTickets.concat(r.selected_tickets.split(',').map(function(s){return s.trim();}));
  });
  var includedPunches=reportTickets.length?punches.filter(function(p){return reportTickets.indexOf(p.no)!==-1;}):punches;

  var date=new Date(today).toLocaleDateString('en-GB',{day:'2-digit',month:'long',year:'numeric'});
  var docNo='QAS2-MDAR-'+today.replace(/-/g,'');
  var allSystems=[...new Set(reports.flatMap(function(r){return (r.system_worked||'').split(',').map(function(s){return s.trim();});}))].filter(Boolean);
  var allAch=reports.filter(function(r){return r.achievements&&r.achievements!=='None reported';}).map(function(r){return r.achievements;});
  var allIss=reports.filter(function(r){return r.issues&&r.issues!=='No issues';}).map(function(r){return {name:r.submitted_by,issue:r.issues};});
  var allPlans=[...new Set(reports.map(function(r){return r.next_plan;}).filter(function(p){return p&&p!=='Continue commissioning activities';}))];

  var c='<div style="font-family:Arial,sans-serif;color:#111">';

  // Header
  c+='<div style="display:flex;align-items:flex-start;justify-content:space-between;border-bottom:3px solid #1F3864;padding-bottom:16px;margin-bottom:20px">'+
    '<img src="data:image/jpeg;base64,LOGO" style="height:52px;object-fit:contain">'+
    '<div style="flex:1;text-align:center;padding:0 20px">'+
    '<div style="font-size:20px;font-weight:700;color:#1F3864">DAILY ACTIVITY REPORT</div>'+
    '<div style="font-size:12px;color:#666;margin-top:3px">Al-Qassim 2 CCGT Power Plant | Wahat Al Wusta Maintenance Co.</div>'+
    '<div style="font-size:11px;color:#888;margin-top:2px">Commissioning Phase – Field Activity Summary</div>'+
    '</div>'+
    '<div style="text-align:right;min-width:150px">'+
    '<div style="font-family:monospace;font-size:13px;font-weight:700;color:#1F3864">'+docNo+'</div>'+
    '<div style="font-size:11px;color:#666;margin-top:3px">'+date+'</div>'+
    '<div style="font-size:11px;color:#666">SCE: Mohammed Alharish</div>'+
    '</div></div>';

  // Stats
  c+='<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px">'+

// ── HANDOVER REPORT ──
function priLabel(p){return p==='A'?'A – Safety Critical':p==='B'?'B – Operational':'C – Minor';}

async function buildHandoverReport(){
  var el=document.getElementById('handover-preview');
  el.innerHTML='<div style="text-align:center;padding:20px;color:var(--gray2);font-size:12px">Loading...</div>';
  var tickets=await sb('qas2_tickets?select=*&order=priority.asc,date.desc')||[];
  var open=tickets.filter(function(t){return t.status==='OPEN';});
  var closed=tickets.filter(function(t){return t.status==='CLOSED';});
  var priA=open.filter(function(t){return t.priority==='A';}).length;

  var date=new Date().toLocaleDateString('en-GB',{day:'2-digit',month:'long',year:'numeric'});

  el.innerHTML=
    '<div style="display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap">'+
    '<button class="btn primary" onclick="printHandoverReport()">&#128438; Save as PDF</button>'+
    '</div>'+
    // Stats
    '<div class="metrics" style="margin-bottom:14px">'+
    '<div class="metric blue"><div class="metric-val">'+tickets.length+'</div><div class="metric-lbl">Total</div></div>'+
    '<div class="metric red"><div class="metric-val">'+open.length+'</div><div class="metric-lbl">Open</div></div>'+
    '<div class="metric green"><div class="metric-val">'+closed.length+'</div><div class="metric-lbl">Closed</div></div>'+
    '<div class="metric amber"><div class="metric-val">'+priA+'</div><div class="metric-lbl">Pri-A Open</div></div>'+
    '<div class="metric '+(open.length===0?'green':'red')+'"><div class="metric-val" style="font-size:16px;margin-top:6px">'+(open.length===0?'READY':'NOT READY')+'</div><div class="metric-lbl">Status</div></div>'+
    '</div>'+
    // Status banner
    '<div style="background:'+(open.length===0?'rgba(16,185,129,.1)':'rgba(239,68,68,.1)')+';border:1px solid '+(open.length===0?'rgba(16,185,129,.2)':'rgba(239,68,68,.2)')+';border-radius:var(--r);padding:12px 16px;margin-bottom:14px;font-weight:700;font-size:13px;color:'+(open.length===0?'var(--green)':'var(--red)')+';text-align:center">'+
    (open.length===0?'&#10003; ALL TICKETS CLOSED — SYSTEM READY FOR HANDOVER':'&#10005; HANDOVER NOT PERMITTED — '+open.length+' open ticket(s) must be closed first')+
    '</div>'+
    // Open tickets
    (open.length?'<div class="card" style="margin-bottom:10px"><div class="card-head"><div class="card-icon">🔴</div><div class="card-title">OPEN TICKETS ('+open.length+')</div></div>'+
    '<div class="card-body" style="padding:0"><table class="tbl">'+
    '<thead><tr><th>No.</th><th>System</th><th>Priority</th><th>Date Raised</th><th>Target Close</th><th>Raised By</th></tr></thead><tbody>'+
    open.map(function(t){return '<tr><td class="no">'+t.no+'</td><td style="font-size:12px;font-weight:600">'+t.system_name+'</td><td><span class="badge '+(t.priority==='A'?'a':t.priority==='B'?'b':'c')+'">'+t.priority+'</span></td><td style="font-size:11px">'+t.date+'</td><td style="font-size:11px;color:'+(isOverdue(t)?'var(--red)':'inherit')+'">'+(t.deadline||'–')+'</td><td style="font-size:11px">'+t.raised_by+'</td></tr>';}).join('')+
    '</tbody></table></div></div>':'')+
    // Closed tickets
    (closed.length?'<div class="card"><div class="card-head"><div class="card-icon">✅</div><div class="card-title">CLOSED TICKETS ('+closed.length+')</div></div>'+
    '<div class="card-body" style="padding:0"><table class="tbl">'+
    '<thead><tr><th>No.</th><th>System</th><th>Priority</th><th>Date Raised</th><th>Date Closed</th><th>Closed By</th></tr></thead><tbody>'+
    closed.map(function(t){return '<tr><td class="no">'+t.no+'</td><td style="font-size:12px;font-weight:600">'+t.system_name+'</td><td><span class="badge '+(t.priority==='A'?'a':t.priority==='B'?'b':'c')+'">'+t.priority+'</span></td><td style="font-size:11px">'+t.date+'</td><td style="font-size:11px">'+(t.date_closed||'–')+'</td><td style="font-size:11px">'+(t.closed_by||t.raised_by||'–')+'</td></tr>';}).join('')+
    '</tbody></table></div></div>':'');
}
